    <linearGradient id="farPosterRight" x1="774" y1="414" x2="634" y2="678" gradientUnits="userSpaceOnUse">
      <stop stop-color="#394553"/>
      <stop offset="1" stop-color="#26313D"/>
    </linearGradient>
    <linearGradient id="shelfTop" x1="240" y1="728" x2="784" y2="728" gradientUnits="userSpaceOnUse">
      <stop stop-color="#657382"/>
      <stop offset="0.5" stop-color="#798696"/>

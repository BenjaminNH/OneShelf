name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APKs
        run: |
          flutter build apk --release --target-platform android-arm,android-arm64,android-x64 --split-per-abi
          flutter build apk --release

      - name: Rename APKs
        run: |
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk OneShelf-${{ inputs.version }}-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk OneShelf-${{ inputs.version }}-arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk OneShelf-${{ inputs.version }}-x86_64.apk
          mv build/app/outputs/flutter-apk/app-release.apk OneShelf-${{ inputs.version }}-universal.apk

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: |
            OneShelf-${{ inputs.version }}-*.apk
          retention-days: 7
